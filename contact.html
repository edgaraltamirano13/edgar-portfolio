<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Edgar Salazar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#CC0000', dark: '#0a0a0a', card: '#1a1a1a' },
          fontFamily: { display: ['Bebas Neue', 'sans-serif'], body: ['Space Grotesk', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-dark text-white font-body overflow-x-hidden cursor-none">

  <div id="cursor" class="cursor-dot"></div>
  <div id="cursor-ring" class="cursor-ring"></div>

  <!-- NAV -->
  <nav class="fixed top-0 left-0 w-full z-50 px-8 py-5 flex justify-between items-center">
    <a href="index.html" class="text-white font-display text-2xl tracking-widest hover:text-brand transition-colors">ES</a>
    <div class="flex gap-8 text-sm tracking-widest uppercase font-medium">
      <a href="projects.html" class="text-gray-400 hover:text-brand transition-colors">Projects</a>
      <a href="demoreel.html" class="text-gray-400 hover:text-brand transition-colors">Demo Reel</a>
      <a href="contact.html" class="text-brand">Contact</a>
    </div>
  </nav>

  <div class="min-h-screen flex flex-col lg:flex-row pt-24 px-8 md:px-16 pb-16 max-w-7xl mx-auto gap-16">

    <!-- LEFT: Header + social -->
    <div class="flex flex-col justify-center lg:flex-1 py-8">
      <p class="text-brand text-sm tracking-[0.3em] uppercase font-medium mb-3 reveal-up">Get in touch</p>
      <h1 class="font-display text-[clamp(4rem,9vw,8rem)] leading-none tracking-wider reveal-up" style="animation-delay:0.1s">CONTACT</h1>

      <p class="text-gray-400 max-w-sm leading-relaxed mt-6 reveal-up" style="animation-delay:0.2s">
        Have a project in mind? Want to collaborate or just say hi? I'd love to hear from you.
      </p>

      <!-- Social Links -->
      <div class="flex flex-col gap-4 mt-10 reveal-up" style="animation-delay:0.3s">
        <a href="https://www.linkedin.com/in/edgarsalazaraltamirano" target="_blank" rel="noopener noreferrer" class="social-link flex items-center gap-4 group text-gray-500 hover:text-white transition-colors">
          <div class="w-10 h-10 rounded-xl bg-card border border-white/10 flex items-center justify-center group-hover:border-brand group-hover:bg-brand/10 transition-all">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
          </div>
          <span class="text-sm tracking-widest uppercase font-medium">LinkedIn</span>
          <svg class="w-4 h-4 ml-auto opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
        </a>

      </div>
    </div>

    <!-- RIGHT: Form -->
    <div class="lg:flex-1 flex flex-col justify-center reveal-up" style="animation-delay:0.2s">

      <!-- Submit button top-right of form -->
      <div class="flex justify-end mb-4">
        <button type="submit" form="contact-form" class="submit-pill px-8 py-3 bg-white text-dark font-medium tracking-widest uppercase text-sm rounded-full hover:bg-brand hover:text-white transition-all duration-300 flex items-center gap-2">
          <span>Send</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        </button>
      </div>

      <form id="contact-form" class="bg-card rounded-2xl p-6 flex flex-col gap-4" novalidate>

        <!-- Name Field -->
        <div class="form-field bg-white rounded-xl p-6 relative group">
          <div class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <div class="flex-1">
              <label for="name" class="block text-black font-bold tracking-widest uppercase text-sm mb-3">Full Name</label>
              <input type="text" id="name" name="name" placeholder="Your full name" required
                class="w-full border-b-2 border-gray-200 focus:border-brand bg-transparent text-dark placeholder-gray-300 focus:outline-none pb-1 transition-colors text-sm font-medium" />
            </div>
          </div>
        </div>

        <!-- Email Field -->
        <div class="form-field bg-white rounded-xl p-6 relative group">
          <div class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <div class="flex-1">
              <label for="email" class="block text-black font-bold tracking-widest uppercase text-sm mb-3">Email</label>
              <input type="email" id="email" name="email" placeholder="your@email.com" required
                class="w-full border-b-2 border-gray-200 focus:border-brand bg-transparent text-dark placeholder-gray-300 focus:outline-none pb-1 transition-colors text-sm font-medium" />
            </div>
          </div>
        </div>

        <!-- Message Field -->
        <div class="form-field bg-white rounded-xl p-6 relative group">
          <div class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            </div>
            <div class="flex-1">
              <label for="message" class="block text-black font-bold tracking-widest uppercase text-sm mb-3">Message</label>
              <textarea id="message" name="message" rows="4" placeholder="Tell me about your project..." required
                class="w-full border-b-2 border-gray-200 focus:border-brand bg-transparent text-dark placeholder-gray-300 focus:outline-none pb-1 transition-colors text-sm font-medium resize-none"></textarea>
            </div>
          </div>
        </div>

        <!-- Status Message -->
        <div id="form-status" class="hidden text-center py-3 px-6 rounded-xl text-sm font-medium tracking-widest uppercase"></div>
        <a id="mailto-fallback-btn" href="#" class="hidden text-center py-3 px-6 rounded-xl text-sm font-medium tracking-widest uppercase border border-white/20 text-gray-300 hover:border-brand hover:text-brand transition-colors" aria-label="Send message with your email app">
          Send via Email App
        </a>

      </form>
    </div>

  </div>

  <script src="js/main.js"></script>
  <script>
    // Optional: set this when frontend and API are on different hosts.
    // Example: window.PORTFOLIO_API_BASE = 'https://your-app.up.railway.app';
    window.PORTFOLIO_API_BASE = window.PORTFOLIO_API_BASE || '';
  </script>
  <script src="js/contact.js"></script>
</body>
</html>
